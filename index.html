<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hoop Hustle 🏀 Slider Shot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a2140;
      color: #fff;
      margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center;
      user-select: none;
      overflow: hidden;
    }
    #homeScreen, #gameScreen {
      width: 100vw; max-width: 400px; min-height: 600px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
    }
    #homeScreen button {
      font-size: 1.3rem;
      margin: 12px 0;
      padding: 14px 30px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #158aff;
      color: white;
      transition: background 0.3s;
    }
    #homeScreen button:hover {
      background: #1f6cd1;
    }
    #scoreBoard {
      font-size: 2rem;
      margin: 15px 0 5px 0;
    }
    #highScore {
      font-size: 1rem;
      margin-bottom: 10px;
      color: #a0c4ff;
    }
    #timeLeft {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    #gameArea {
      position: relative;
      width: 350px;
      height: 450px;
      background: #15305e;
      border-radius: 20px;
      overflow: visible;
      box-shadow: 0 0 10px #0050ffaa;
      user-select: none;
    }
    /* Hoop ring with red center */
    #hoop {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      border: 8px solid #ddd;
      border-radius: 50%;
      box-sizing: border-box;
      pointer-events: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    #hoopCenter {
      width: 50px;
      height: 50px;
      background: #d33;
      border-radius: 50%;
      box-shadow: 0 0 12px #ff4444cc;
    }

    #ball {
      position: absolute;
      font-size: 50px;
      user-select: none;
      left: 150px;
      top: 350px;
      pointer-events: none;
      opacity: 1;
      transition: none;
      z-index: 2;
    }
    #sliderContainer {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 20px;
      background: #555;
      border-radius: 10px;
      user-select: none;
      cursor: pointer;
      overflow: visible;
      z-index: 3;
    }
    #sliderArrow {
      position: absolute;
      top: -18px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 18px solid #ffbb00;
      left: 0;
      transition: none;
      user-select: none;
    }
    #message {
      margin-top: 15px;
      font-size: 1.3rem;
      color: #ffbb00;
      height: 28px;
      min-height: 28px;
      user-select: none;
    }
    #restartBtn {
      margin-top: 20px;
      font-size: 1.1rem;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff7700;
      color: white;
      cursor: pointer;
      display: none;
      user-select: none;
    }
  </style>
</head>
<body>

<div id="homeScreen">
  <h1>Hoop Hustle 🏀</h1>
  <p>Select Game Mode</p>
  <button data-mode="classic">Classic (60 sec)</button>
  <button data-mode="streak">Streak (No miss)</button>
  <button data-mode="moving">Moving Hoop</button>
</div>

<div id="gameScreen" style="display:none; flex-direction: column; align-items: center; position:relative;">
  <div id="scoreBoard">Score: 0</div>
  <div id="highScore">High Score: 0</div>
  <div id="timeLeft"></div>
  <div id="gameArea">
    <div id="hoop">
      <div id="hoopCenter"></div>
    </div>
    <div id="ball">🏀</div>
    <div id="sliderContainer" title="Tap to stop the arrow and shoot!">
      <div id="sliderArrow"></div>
    </div>
  </div>
  <div id="message"></div>
  <button id="restartBtn">Restart</button>
</div>

<script>
(() => {
  const homeScreen = document.getElementById('homeScreen');
  const gameScreen = document.getElementById('gameScreen');
  const scoreBoard = document.getElementById('scoreBoard');
  const highScoreDisplay = document.getElementById('highScore');
  const timeLeftDisplay = document.getElementById('timeLeft');
  const gameArea = document.getElementById('gameArea');
  const hoop = document.getElementById('hoop');
  const hoopCenter = document.getElementById('hoopCenter');
  const ball = document.getElementById('ball');
  const sliderContainer = document.getElementById('sliderContainer');
  const sliderArrow = document.getElementById('sliderArrow');
  const message = document.getElementById('message');
  const restartBtn = document.getElementById('restartBtn');

  let score = 0;
  let highScores = {};
  let mode = '';
  let timeLeft = 60;
  let timerInterval = null;
  let gameActive = false;
  let streakMode = false;
  let movingHoop = false;
  let hoopX = 0;
  let hoopDir = 1;

  // Slider variables
  let sliderDirection = 1; // 1 = right, -1 = left
  let sliderPosition = 0; // px from left
  let sliderMax = 0;
  let sliderMoving = true;

  // Load high scores
  function loadHighScores() {
    const saved = localStorage.getItem('hoopHustleHighScores');
    highScores = saved ? JSON.parse(saved) : {};
  }
  function saveHighScores() {
    localStorage.setItem('hoopHustleHighScores', JSON.stringify(highScores));
  }
  function getHighScoreForMode(m) {
    return highScores[m] || 0;
  }
  function setHighScoreForMode(m, val) {
    if (!highScores[m] || val > highScores[m]) {
      highScores[m] = val;
      saveHighScores();
    }
  }

  // Update displays
  function updateScore() {
    scoreBoard.textContent = `Score: ${score}`;
    highScoreDisplay.textContent = `High Score: ${getHighScoreForMode(mode)}`;
  }
  function updateTime() {
    if (mode === 'streak') {
      timeLeftDisplay.textContent = '';
    } else {
      timeLeftDisplay.textContent = `Time Left: ${timeLeft}s`;
    }
  }

  // Reset ball position
  function resetBall() {
    ball.style.transition = 'none';
    // Start ball horizontally aligned with arrow position for next shot
    ball.style.top = '350px';
    ball.style.opacity = '1';
    // ball.style.left will be set later before shot
  }

  // Animate ball going into hoop vertically at given horizontal position
  function animateShot(targetX, callback) {
    const hoopRect = hoop.getBoundingClientRect();
    const areaRect = gameArea.getBoundingClientRect();

    const hoopCenterY = hoopRect.top - areaRect.top + hoopRect.height / 2 - 25; // center Y of hoop relative to gameArea

    ball.style.transition = 'all 0.6s ease-in-out';
    ball.style.left = targetX + 'px';
    ball.style.top = hoopCenterY + 'px';
    ball.style.opacity = '0';

    setTimeout(() => {
      resetBall();
      if (callback) callback();
    }, 650);
  }

  // Move hoop left-right for moving mode
  function moveHoop() {
    if (!movingHoop) return;
    hoopX += hoopDir * 3;
    if (hoopX > gameArea.clientWidth - 120) hoopDir = -1;
    if (hoopX < 0) hoopDir = 1;
    hoop.style.left = hoopX + 'px';
  }

  // Game loop
  function gameLoop() {
    if (!gameActive) return;
    if (movingHoop) moveHoop();

    // Move slider arrow if moving
    if (sliderMoving) {
      sliderPosition += sliderDirection * 4;
      if (sliderPosition > sliderMax) {
        sliderPosition = sliderMax;
        sliderDirection = -1;
      } else if (sliderPosition < 0) {
        sliderPosition = 0;
        sliderDirection = 1;
      }
      sliderArrow.style.left = sliderPosition + 'px';
    }
    requestAnimationFrame(gameLoop);
  }

  // Start game
  function startGame(selectedMode) {
    mode = selectedMode;
    score = 0;
    timeLeft = 60;
    streakMode = mode === 'streak';
    movingHoop = mode === 'moving';
    hoopX = gameArea.clientWidth / 2 - 60;
    hoop.style.left = '50%';
    hoop.style.transform = 'translateX(-50%)';
    gameActive = true;
    message.textContent = '';
    restartBtn.style.display = 'none';

    sliderPosition = 0;
    sliderDirection = 1;
    sliderMoving = true;
    sliderMax = sliderContainer.clientWidth - 20;
    sliderArrow.style.left = '0px';

    resetBall();
    // Put ball horizontally aligned with slider arrow for next shot
    ball.style.left = (sliderContainer.offsetLeft + sliderPosition) + 'px';

    updateScore();
    updateTime();

    if (!streakMode) {
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTime();
        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    homeScreen.style.display = 'none';
    gameScreen.style.display = 'flex';

    gameLoop();
  }

  // End game
  function endGame() {
    gameActive = false;
    clearInterval(timerInterval);
    setHighScoreForMode(mode, score);
    updateScore();
    message.textContent = `Game Over! Final Score: ${score}`;
    restartBtn.style.display = 'inline-block';
    sliderMoving = false;
  }

  // Check if ball center is inside red center circle horizontally and vertically
  function checkScore(ballLeft) {
    const hoopRect = hoop.getBoundingClientRect();
    const hoopCenterRect = hoopCenter.getBoundingClientRect();
    const areaRect = gameArea.getBoundingClientRect();

    // hoopCenter position relative to gameArea
    const hoopCenterX = hoopCenterRect.left - areaRect.left + hoopCenterRect.width / 2;
    const hoopCenterY = hoopCenterRect.top - areaRect.top + hoopCenterRect.height / 2;
    const hoopRadius = hoopCenterRect.width / 2;

    // Ball center coords relative to gameArea
    const ballCenterX = ballLeft + 25; // ball width 50px
    const ballCenterY = hoopRect.top - areaRect.top + hoopRect.height / 2 - 25; // Y where ball lands (top of hoop center)

    // Calculate distance between ball center and hoop center
    const distX = Math.abs(ballCenterX - hoopCenterX);
    const distY = Math.abs(ballCenterY - hoopCenterY);

    return distX <= hoopRadius && distY <= hoopRadius;
  }

  // Handle tap/click on slider to shoot
  sliderContainer.addEventListener('click', () => {
    if (!gameActive || !sliderMoving) return;
    sliderMoving = false;

    const targetX = sliderContainer.offsetLeft + sliderPosition;

    animateShot(targetX, () => {
      if (checkScore(targetX)) {
        score++;
        updateScore();
        message.textContent = 'Nice shot! 🎉';
      } else {
        if (streakMode) {
          endGame();
        } else {
          message.textContent = 'Missed! Try again...';
        }
      }
      if (gameActive) {
        sliderPosition = 0;
        sliderDirection = 1;
        sliderMoving = true;
        sliderArrow.style.left = '0px';
        resetBall();
        ball.style.left = (sliderContainer.offsetLeft + sliderPosition) + 'px';
      }
    });
  });

  restartBtn.addEventListener('click', () => {
    startGame(mode);
  });

  homeScreen.querySelectorAll('button[data-mode]').forEach(btn => {
    btn.addEventListener('click', e => {
      startGame(e.target.getAttribute('data-mode'));
    });
  });

  loadHighScores();
})();
</script>

</body>
</html>
